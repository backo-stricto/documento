name: "Publish release to PyPI"

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    env:
      UV_CACHE_DIR: /tmp/.uv_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish